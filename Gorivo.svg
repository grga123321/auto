* {
    margin: 0;
    padding: 0;
    font-family: "DM Sans", sans-serif;
}

a {
    text-decoration: none;

}

body {
    background: #ffffff;
    font-family: "DM Sans", sans-serif;
    font-style: normal;
}

.header {
    display: flex;
    padding-top: 28px;
    padding-bottom: 28px;
    padding-left: 60px;
    padding-right: 60px;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    background: transparent;
}

#header1 {
    display: flex;
    align-items: center;
}

#logo {
    width: 108px;
    height: 26px;
    flex-shrink: 0;
    margin-right: 40px;
}

#phone {
    width: 12px;
    height: 18px;
    flex-shrink: 0;
    margin-right: 9px;
}

#number {
    color: #fff;
    text-align: center;
    font-size: 15px;
    font-weight: 500;
    line-height: 15px;
}

#header2 {
    display: flex;
    align-items: center;
}

#header2>a {
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    line-height: 27.75px;
    text-transform: capitalize;
}

#header2>img {
    margin-right: 10px;
    width: 15px;
    height: 15px;
}

#dropdown {
    margin-right: 30px;
}

#dropdown::after {
    content: "";
    display: inline-block;
    margin-left: 6px;
    vertical-align: middle;
    margin-left: 6px;
    border-top: 4px solid #fff;
    border-right: 4px solid transparent;
    border-left: 4px solid transparent;
}

#m1 {
    margin-right: 30px;
}

#m2 {
    margin-right: 40px;
}

#header3 {
    display: flex;
    align-items: center;
}

#listing {
    border-radius: 16px;
    border: 1px solid #fff;
    background: transparent;
    text-align: center;
    font-size: 15px;
    font-weight: 500;
    line-height: 27.75px;
    display: flex;
    height: 47.75px;
    padding: 9.125px 15.644px 10.875px 26px;
    justify-content: flex-end;
    align-items: center;
    color: #fff;
}

.first {
    background-image: url(../Images/Auto.png);
    width: 100%;
    height: 960px;
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    margin-top: -103.75px;
    padding-top: 103.75px;
    display: flex;
    flex-direction: row;
}

#first1 {
    display: flex;
    flex-direction: column;
    margin-top: 312px;
    margin-left: 245px;
    gap: 14.5px;
}

#first1>h2 {
    color: #FFF;
    font-size: 40px;
    font-weight: 700;
    line-height: 60px;
    width: 182.892px;
    height: 60px;
    justify-content: center;
}

#first1>h1 {
    color: #FFF;
    font-size: 70px;
    font-weight: 500;
    line-height: 84px;
    width: 486.86px;
    height: 168px;
    justify-content: center;
    flex-shrink: 0;
}

#first2 {
    display: flex;
    flex-direction: column;
    width: 275.16px;
    height: 724.75px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.10);
    margin-top: 71.5px;
    margin-left: 840px;
    padding-left: 55.15px;
    gap: 0px;
}

#first2>p {
    color: #FFF;
    font-size: 15px;
    font-weight: 400;
    line-height: 27.75px;
}

#first2>h3 {
    color: #FFF;
    font-size: 20px;
    font-weight: 500;
    line-height: 20px;
    display: flex;
    width: 91.942px;
    height: 43.275px;
}

#img1 {
    width: 30px;
    height: 30px;
    margin-top: 55px;
    margin-bottom: 12px;
}

#img2 {
    width: 34px;
    height: 37px;
    margin-top: 5px;
    margin-bottom: 5px;
}

#img3 {
    width: 35px;
    height: 37px;
    margin-top: 5px;
    margin-bottom: 5px;
}

#img4 {
    width: 34px;
    height: 43px;
    margin-top: 5px;
    margin-bottom: 6px;
}

#first2>a>button{
display: flex;
width: 165px;
height: 116px;
padding: 13px 31px 76px 31px;
justify-content: center;
align-items: center;
gap: 9px;
border-radius: 16px;
border: 1px solid #FFF;
background: #FFF;
color: #050B20;
text-align: center;
font-size: 15px;
font-weight: 500;
line-height: 27.75px;
}